<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>brx — offline routing, shareable URLs</title>
<meta name="theme-color" content="#1e1e28">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.webmanifest">
</head>
<body>
<div id="map"></div>

<div id="toolbar" class="panel">
  <div class="brand">brx<button id="collapse" title="Collapse panel" aria-label="Collapse panel" aria-expanded="true">‹</button></div>
  <div id="toolbar-body">
  <label>Engine
    <select id="engine">
      <option value="local">Local (offline)</option>
      <option value="brouter">BRouter (online)</option>
    </select>
  </label>
  <label>Profile
    <select id="profile"></select>
  </label>
  <label id="endpoint-row" hidden>BRouter URL
    <input id="endpoint" type="text" spellcheck="false" title="BRouter endpoint URL">
  </label>
  <details id="regions-box" open>
    <summary>Offline data</summary>
    <div class="row">
      <button id="download-region" title="Download roads in the visible area for offline routing">⬇ Download visible area</button>
    </div>
    <div id="region-progress" class="hint" hidden></div>
    <ul id="region-list"></ul>
  </details>
  <button id="install" hidden title="Install brx on this device">📲 Install app</button>
  <div class="row">
    <button id="reverse" title="Reverse route">⇅ Reverse</button>
    <button id="clear" title="Remove all waypoints">✕ Clear</button>
  </div>
  <div class="row">
    <button id="import" title="Import GPX">Import GPX</button>
    <button id="export" title="Export GPX" disabled>Export GPX</button>
    <input id="file" type="file" accept=".gpx,application/gpx+xml" hidden>
  </div>
  <div id="stats" class="stats" hidden>
    <span id="stat-dist"></span>
    <span id="stat-ascend"></span>
    <span id="stat-time"></span>
  </div>
  <div class="hint">Click the map to add waypoints · click the route to insert a via ·
    right-click a marker to delete · drag to move</div>
  </div>
</div>

<div id="banner" class="banner" hidden>
  <span id="banner-text"></span>
  <button id="banner-fallback" hidden>Route online instead</button>
  <button id="banner-close">✕</button>
</div>

<div id="elevation-panel" class="panel elevation" hidden>
  <canvas id="elevation"></canvas>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
